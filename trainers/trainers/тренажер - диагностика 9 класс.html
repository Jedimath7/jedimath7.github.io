    <style>
/* === CORE.CSS — общие стили тренажёров === */
/* Тема задаётся через CSS custom properties (вставляется build.js после этого файла) */

body {
  font-family: 'EB Garamond', serif;
  background: radial-gradient(circle at center, var(--bg-start) 0%, var(--bg-mid) 80%, var(--bg-end) 100%);
  color: #1a0f09;
  max-width: var(--body-max-width);
  margin: 0 auto;
  padding: 40px 20px;
  line-height: 1.6;
  min-height: 100vh;
  text-align: center;
}

/* === Ссылки «← Все тренажёры» (на портал) и «следующий тренажёр →» === */

a.portal-link,
a.next-link {
  position: absolute;
  top: 12px;
  font-size: 0.95em;
  color: var(--card-muted);
  text-decoration: none;
  opacity: 0.75;
  transition: opacity 0.2s ease;
}

a.portal-link { left: 16px; }
a.next-link { right: 16px; }

a.portal-link:hover,
a.next-link:hover {
  opacity: 1;
  text-decoration: underline;
}

/* На узких экранах слово «тренажёр» прячем, чтобы ссылки в углах не наезжали друг на друга */
@media (max-width: 480px) {
  a.next-link .nl-word { display: none; }
}

h2 {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  color: #1a0f09;
  text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.15);
  margin-bottom: 30px;
  position: relative;
}

h2::after {
  content: '';
  display: block;
  width: 50%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 15px auto 0;
}

h3 {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  color: #1a0f09;
  margin-bottom: 30px;
}

/* === Прогресс-бар === */

#progress-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

#progress-bar-wrap {
  flex: 1;
  height: 5px;
  background-color: rgba(42, 23, 16, 0.15);
  border-radius: 3px;
  overflow: hidden;
  box-shadow: inset 0 1px 4px rgba(0,0,0,0.3);
}

#progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 5px rgba(48, 30, 21, 0.6);
}

#progress-text {
  font-size: 0.95em;
  color: var(--progress-text);
  white-space: nowrap;
  min-width: 60px;
  text-align: right;
}

/* === Карточка задания === */

#card {
  margin: 30px 0 20px;
  padding: 50px 20px 30px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.08);
  position: relative;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.15s ease;
}

#task-counter {
  position: absolute;
  top: 12px;
  left: 20px;
  font-size: 1em;
  color: var(--card-muted);
}

#round-badge {
  position: absolute;
  top: 12px;
  right: 20px;
  font-size: 0.85em;
  color: #8b6b4f;
  display: none;
}

#round-badge.visible {
  display: block;
}

#math-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

#math-row.dual {
  gap: 6px;
}

.eq-sign {
  font-size: var(--math-font-size);
  color: #1a0f09;
  margin: 0 4px;
}

.sqrt-sign {
  font-size: 1.8em;
  color: #1a0f09;
  margin: 0 2px;
}

#math-expr {
  font-size: var(--math-font-size);
  text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.2);
}

/* === Поля ввода === */

input[type="text"] {
  width: var(--input-width);
  padding: 8px 14px;
  font-size: 1.6em;
  text-align: center;
  background-color: transparent;
  border: none;
  border-bottom: 2px solid var(--accent);
  color: #1a0f09;
  font-family: 'EB Garamond', serif;
  transition: all 0.3s ease;
}

input[type="text"]:focus {
  outline: none;
  border-bottom-color: #1a0f09;
  background-color: rgba(0, 0, 0, 0.06);
  border-radius: 4px 4px 0 0;
}

input.small-input {
  width: 60px;
  padding: 8px 6px;
  font-size: 1.4em;
}

/* === Кнопка отправки ответа «✓» (для касания; на клавиатуре — Enter) === */

button.submit-btn {
  width: 44px;              /* минимальный удобный размер цели для пальца */
  height: 44px;
  flex-shrink: 0;
  margin-left: 6px;
  border: 2px solid var(--accent);
  border-radius: 50%;
  background: transparent;
  color: var(--accent);
  font-size: 1.25em;
  line-height: 1;
  cursor: pointer;
  opacity: 0.7;
  transition: all 0.2s ease;
}

button.submit-btn:hover {
  opacity: 1;
  background: rgba(0, 0, 0, 0.06);
}

button.submit-btn:active {
  opacity: 1;
  background: var(--accent);
  color: #e8dcc0;
}

input[type="text"]:disabled {
  border-bottom-color: transparent;
  color: #1a330e;
  font-weight: bold;
  text-shadow: 0 0 8px rgba(119, 148, 77, 0.3);
}

/* === Обратная связь === */

#big-feedback {
  font-size: 3em;
  height: 1.2em;
  line-height: 1.2;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

#big-feedback.show { opacity: 1; transform: scale(1.1); }
#big-feedback.correct { color: #1a330e; }
#big-feedback.incorrect { color: #5c0000; }

#correct-answer {
  font-size: 1.1em;
  color: var(--card-muted);
  min-height: 1.5em;
  opacity: 0;
  transition: opacity 0.2s ease;
}
#correct-answer.show { opacity: 1; }

/* === Сообщение о завершении === */

#done-message {
  display: none;
  margin-top: 40px;
  padding: 20px;
  font-family: 'Cinzel', serif;
  font-size: 1.3em;
  color: #1a330e;
}

/* === Цитата между спринтами === */

#quote-overlay {
  display: none;
  margin: 30px 0 20px;
  padding: 50px 20px 30px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.08);
  min-height: 160px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#quote-overlay.show { display: flex; cursor: pointer; }

/* Шапка для фактов-«изюминок» (скрыта, когда показывается цитата) */
#quote-kicker {
  display: none;
  font-family: 'Cinzel', serif;
  font-size: 0.85em;
  letter-spacing: 0.12em;
  color: var(--accent);
  margin-bottom: 14px;
}

#quote-kicker.show { display: block; }

#quote-text {
  font-size: 1.4em;
  font-style: italic;
  color: #1a0f09;
  margin-bottom: 12px;
  line-height: 1.5;
}

/* Факт — не курсивом, чуть мельче цитаты: это справка, а не изречение */
#quote-text.fact {
  font-style: normal;
  font-size: 1.2em;
}

#quote-author {
  font-family: 'Cinzel', serif;
  font-size: 1em;
  color: #5c5240;
}

/* №15/№16: личная статистика на паузе — между фактом и подсказкой «продолжить» */
#pause-stats {
  margin-top: 18px;
  font-size: 1em;
  color: #5c5240;
}

#pause-stats b {
  color: var(--accent);
  font-weight: 700;
}

#pause-stats .ps-history {
  display: block;
  margin-top: 6px;
  font-size: 0.85em;
  color: #8a8070;
}

#quote-continue {
  margin-top: 20px;
  font-size: 0.9em;
  color: #8a8070;
}

/* === Эффекты streak === */

#streak-flash {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  pointer-events: none;
  z-index: 200;
  opacity: 0;
  font-family: 'Cinzel', serif;
  font-size: 2.2em;
  color: #1a0f09;
  text-shadow: 0 0 20px rgba(200, 170, 80, 0.6);
  transition: none;
}

#streak-flash.fire {
  animation: streakPopup 1.2s ease-out forwards;
}

@keyframes streakPopup {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  25%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  40%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  80%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
}

/* === Секция ошибок === */

#error-section {
  display: none;
  margin-top: 40px;
}

#card-error {
  padding: 30px 20px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.08);
  position: relative;
}

#task-counter-error {
  font-size: 1em;
  color: var(--card-muted);
  margin-bottom: 15px;
}

.error-math-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.error-math-row.dual {
  gap: 4px;
}

#math-expr-error {
  font-size: 2em;
  text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.2);
}

#big-feedback-error {
  font-size: 3em;
  height: 1.2em;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
}

#correct-answer-error {
  font-size: 1.1em;
  color: var(--card-muted);
  min-height: 1.5em;
  opacity: 0;
  transition: opacity 0.2s;
}

/* === LIST ENGINE (образец) === */

body.list-mode {
  text-align: left;
}

.list-mode h2 {
  text-align: center;
}

.list-mode #progress-container {
  width: 100%;
  height: 6px;
  background-color: rgba(42, 23, 16, 0.15);
  border-radius: 3px;
  margin-bottom: 40px;
  overflow: hidden;
  box-shadow: inset 0 1px 4px rgba(0,0,0,0.3);
}

.list-mode #progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 5px rgba(48, 30, 21, 0.6);
}

.task-container {
  display: flex;
  align-items: center;
  margin-bottom: 25px;
  padding: 10px;
  border-radius: 8px;
  transition: background-color 0.3s ease;
}

.task-container:hover {
  background-color: rgba(0, 0, 0, 0.05);
}

.math-expr {
  width: 50%;
  text-align: right;
  margin-right: 25px;
  font-size: 1.5em;
  text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.2);
}

.list-mode input[type="text"] {
  width: 70px;
  padding: 5px 10px;
  font-size: 1.4em;
}

.feedback {
  width: 40px;
  margin-left: 20px;
  font-size: 1.2em;
  text-align: left;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.feedback.show { opacity: 1; transform: scale(1.2); }
.feedback.correct { color: #1a330e; }
.feedback.incorrect { color: #5c0000; }

#error-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 10%;
  right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, #5c0000, transparent);
  opacity: 0.5;
}

/* === Адаптивность === */

@media (max-width: 600px) {
  .task-container {
    flex-direction: column;
    background-color: rgba(0, 0, 0, 0.04);
    border-radius: 12px;
    padding: 20px 10px;
  }
  .math-expr {
    width: 100%;
    text-align: center;
    margin-right: 0;
    margin-bottom: 15px;
  }
  .list-mode input[type="text"] { width: 100px; }
  .feedback {
    margin-left: 0;
    margin-top: 15px;
    text-align: center;
  }
  h2::after { width: 80%; }
}

/* === Diagnostic engine === */
#section-title {
  font-family: 'Cinzel', serif;
  font-size: 1.4em;
  color: var(--accent);
  margin-bottom: 4px;
}
#overall-counter {
  font-size: 0.9em;
  color: var(--card-muted);
  margin-bottom: 10px;
}
#dunno-row {
  margin-top: 14px;
}
#dunno-btn {
  font-family: 'EB Garamond', serif;
  font-size: 1em;
  padding: 6px 24px;
  border: 2px solid var(--accent);
  border-radius: 20px;
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.2s ease;
  opacity: 0.7;
}
#dunno-btn:hover {
  opacity: 1;
  background: rgba(0,0,0,0.06);
}
#big-feedback.skipped {
  color: #8b7a60;
  font-size: 1.2em;
  font-style: italic;
}
input[type="text"].skipped {
  border-color: #8b7a60;
  color: #8b7a60;
}

/* Report */
#report-area {
  max-width: 800px;
  margin: 0 auto;
  text-align: left;
}
#report-area h2 {
  text-align: center;
  margin-bottom: 30px;
}
.report-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 24px;
  font-size: 0.95em;
}
.report-table th {
  background: rgba(0,0,0,0.08);
  padding: 10px 12px;
  text-align: left;
  border-bottom: 2px solid rgba(0,0,0,0.15);
  font-weight: 700;
}
.report-table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  vertical-align: top;
}
.sec-name { font-weight: 700; }
.pct-good { color: #2a6a2a; font-weight: 700; }
.pct-ok { color: #8a6a00; font-weight: 700; }
.pct-bad { color: #8a2a2a; font-weight: 700; }
.trainer-link {
  color: var(--accent);
  text-decoration: underline;
  font-size: 0.9em;
}
.trainer-link:hover { opacity: 0.7; }
.error-detail-row td { padding: 0 12px 16px; }
.error-detail {
  background: rgba(0,0,0,0.03);
  border-radius: 6px;
  padding: 12px 16px;
  font-size: 0.9em;
}
.error-detail-title {
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--accent);
}
.error-item {
  margin-bottom: 4px;
  padding: 4px 0;
}
.error-q { opacity: 0.8; }
.report-total {
  font-size: 1.2em;
  text-align: center;
  padding: 16px;
  margin-bottom: 20px;
  border-radius: 8px;
  background: rgba(0,0,0,0.04);
}
.report-advice {
  font-size: 0.95em;
  color: var(--card-muted);
  margin-bottom: 24px;
  line-height: 1.6;
}
.report-restart {
  text-align: center;
  margin-top: 24px;
}
#restart-btn {
  font-family: 'EB Garamond', serif;
  font-size: 1.05em;
  padding: 10px 32px;
  border: 2px solid var(--accent);
  border-radius: 24px;
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.2s ease;
}
#restart-btn:hover {
  background: var(--accent);
  color: #fff;
}

/* №7: на телефоне математика — главное (крупнее, чем было), служебные
   элементы (заголовок, счётчики, ссылки в углах) — мельче и бледнее */
@media (max-width: 500px) {
  #math-expr { font-size: 2em; }
  #math-expr-error { font-size: 1.8em; }
  #card { padding: 40px 10px 20px; }
  input[type="text"] { width: 90px; font-size: 1.5em; }
  h2 { font-size: 1.25em; margin-bottom: 20px; }
  h2::after { width: 80%; }
  #task-counter, #round-badge { font-size: 0.8em; opacity: 0.65; }
  #progress-text { font-size: 0.8em; opacity: 0.75; min-width: 48px; }
  a.portal-link, a.next-link { font-size: 0.85em; opacity: 0.55; }
}

/* === Режим кнопок-вариантов (inputMode: choice) === */

.choice-row {
  display: flex;
  justify-content: center;
  gap: 28px;
  margin-top: 20px;
}

button.choice-btn {
  font-family: 'EB Garamond', serif;
  font-size: 1.5em;
  padding: 8px 44px;
  border: 2px solid var(--accent);
  border-radius: 30px;
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: all 0.2s ease;
}

button.choice-btn:hover:not(:disabled) {
  background: rgba(0, 0, 0, 0.07);
}

button.choice-btn:disabled {
  opacity: 0.4;
  cursor: default;
}

button.choice-btn.chosen {
  background: var(--accent);
  color: #e8dcc0;
  opacity: 1;
}

/* === Вертикальная компоновка карточки (stackedLayout) === */

#math-row.stacked,
.error-math-row.stacked {
  flex-direction: column;
  gap: 16px;
}

#math-row.stacked #math-expr,
.error-math-row.stacked #math-expr-error {
  max-width: 100%;
}

/* === Чертежи в заданиях (инлайн-SVG) === */

svg.fig {
  display: block;
  margin: 0 auto;
  max-width: 100%;
  height: auto;
}

@media (max-width: 480px) {
  button.choice-btn { font-size: 1.2em; padding: 6px 30px; }
  .choice-row { gap: 16px; }
}

      }

</head>

    <script>
window.TRAINER_CONFIG = {

  "sections": [

      "tasks": [
        {

        {

    }
  }
  s.days = Object.keys(seen).length;
  return s;
};

// engine-diagnostic.js — движок «диагностика» (секции, одно задание, «Не знаю», отчёт)
(function() {
  const C = window.TRAINER_CONFIG;
  const FEEDBACK_DELAY = 600;
  const SECTIONS = C.sections;

  const norm = buildNorm(C.normMode || 'basic');
  // №9: запись каждого ответа в localStorage («Не знаю» считается ошибкой)
  const store = TrainerStorage(C.id);

  // --- Compute total tasks ---
  let totalTasks = 0;
  for (var i = 0; i < SECTIONS.length; i++) {
    totalTasks += SECTIONS[i].tasks.length;
  }

  // --- State ---
  var sectionIdx = 0;
  var taskIdx = 0;
  var totalSolved = 0;
  var locked = false;

  // Per-task results
  var results = []; // { sectionIdx, taskIdx, userAnswer, correctAnswer, isCorrect, isSkipped }

  // --- DOM refs ---
  var $sectionTitle = document.getElementById('section-title');
  var $taskCounter = document.getElementById('task-counter');
  var $overallCounter = document.getElementById('overall-counter');
  var $expr = document.getElementById('math-expr');
  var $input = document.getElementById('answer-input');
  var $feedback = document.getElementById('big-feedback');
  var $correct = document.getElementById('correct-answer');
  var $dunnoBtn = document.getElementById('dunno-btn');
  var $progressBar = document.getElementById('progress-bar');
  var $progressText = document.getElementById('progress-text');
  var $mainArea = document.getElementById('main-area');
  var $reportArea = document.getElementById('report-area');
  var $reportContent = document.getElementById('report-content');

  // --- Current section/task ---
  function currentSection() { return SECTIONS[sectionIdx]; }
  function currentTask() { return currentSection().tasks[taskIdx]; }
  function isLastTask() { return taskIdx >= currentSection().tasks.length - 1; }
  function isLastSection() { return sectionIdx >= SECTIONS.length - 1; }

  // --- Update UI ---
  function updateCounters() {
    $sectionTitle.textContent = currentSection().title;
    $taskCounter.textContent = 'Задание ' + (taskIdx + 1) + ' из ' + currentSection().tasks.length;
    // overall counter
    var done = 0;
    for (var s = 0; s < sectionIdx; s++) done += SECTIONS[s].tasks.length;
    done += taskIdx;
    $overallCounter.textContent = 'Секция ' + (sectionIdx + 1) + ' из ' + SECTIONS.length + ' / Всего пройдено: ' + done + ' из ' + totalTasks;
  }

  function updateProgress() {
    var done = 0;
    for (var s = 0; s < sectionIdx; s++) done += SECTIONS[s].tasks.length;
    done += taskIdx;
    var pct = (done / totalTasks) * 100;
    $progressBar.style.width = pct + '%';
    $progressText.textContent = done + ' / ' + totalTasks;
  }

  function showTask() {
    updateCounters();
    updateProgress();
    var t = currentTask();
    $expr.textContent = t.q;
    $input.value = '';
    $input.className = '';
    $feedback.textContent = '';
    $feedback.className = '';
    $correct.textContent = '';
    $correct.style.display = 'none';
    $dunnoBtn.style.display = '';
    locked = false;
    MathJax.typesetPromise([$expr]).then(function() {
      $input.focus();
    });
    store.shown(); // №9: старт отсчёта времени ответа
  }

  function showReport() {
    $mainArea.style.display = 'none';
    document.getElementById('progress-row').style.display = 'none';
    $reportArea.style.display = '';

    var html = '<div class="report-summary">';

    // Per-section table
    html += '<table class="report-table"><thead><tr><th>Секция</th><th>Верно</th><th>Всего</th><th>%</th><th>Рекомендуемый тренажёр</th></tr></thead><tbody>';

    var totalCorrect = 0;
    var totalCount = 0;

    for (var s = 0; s < SECTIONS.length; s++) {
      var section = SECTIONS[s];
      var sectionResults = [];
      for (var r = 0; r < results.length; r++) {
        if (results[r].sectionIdx === s) sectionResults.push(results[r]);
      }

      var correct = 0;
      for (var c = 0; c < sectionResults.length; c++) {
        if (sectionResults[c].isCorrect) correct++;
      }
      var total = sectionResults.length;
      var pct = total > 0 ? Math.round((correct / total) * 100) : 0;

      totalCorrect += correct;
      totalCount += total;

      var pctClass = pct >= 80 ? 'pct-good' : pct >= 50 ? 'pct-ok' : 'pct-bad';

      html += '<tr>';
      html += '<td class="sec-name">' + section.title + '</td>';
      html += '<td>' + correct + '</td><td>' + total + '</td>';
      html += '<td class="' + pctClass + '">' + pct + '%</td>';
      html += '<td><a href="' + section.trainerFile + '" target="_blank" class="trainer-link">' + section.trainerTitle + '</a></td>';
      html += '</tr>';

      // Error list for this section
      var errors = [];
      for (var e = 0; e < sectionResults.length; e++) {
        if (!sectionResults[e].isCorrect) errors.push(sectionResults[e]);
      }

      if (errors.length > 0) {
        html += '<tr class="error-detail-row"><td colspan="5"><div class="error-detail">';
        html += '<div class="error-detail-title">Ошибки в секции «' + section.title + '»:</div>';
        for (var er = 0; er < errors.length; er++) {
          var err = errors[er];
          var icon = err.isSkipped ? '⊘' : '✗';
          var label = err.isSkipped ? 'Пропущено' : 'Ответ: ' + err.userAnswer;
          html += '<div class="error-item">' + icon + ' <span class="error-q">' + err.q + '</span> → ' + label + ' (правильно: <strong>' + err.correctAnswer + '</strong>)</div>';
        }
        html += '</div></td></tr>';
      }
    }

    var totalPct = totalCount > 0 ? Math.round((totalCorrect / totalCount) * 100) : 0;
    var totalPctClass = totalPct >= 80 ? 'pct-good' : totalPct >= 50 ? 'pct-ok' : 'pct-bad';

    html += '</tbody></table>';

    html += '<div class="report-total ' + totalPctClass + '">Общий результат: ' + totalCorrect + ' из ' + totalCount + ' (' + totalPct + '%)</div>';

    html += '<div class="report-advice">';
    html += '<p>Рекомендуется повторить темы, по которым процент ниже 80% — откройте соответствующий тренажёр (ссылки в таблице) и нарешайте до автоматизма.</p>';
    html += '</div>';

    html += '</div>';

    $reportContent.innerHTML = html;
    MathJax.typesetPromise([$reportContent]);
  }

  function advance() {
    if (isLastTask()) {
      if (isLastSection()) {
        // All done
        showReport();
      } else {
        sectionIdx++;
        taskIdx = 0;
        showTask();
      }
    } else {
      taskIdx++;
      showTask();
    }
  }

  function handleAnswer(userAnswer, isSkipped) {
    if (locked) return;
    locked = true;
    $dunnoBtn.style.display = 'none';

    var t = currentTask();
    var isCorrect = false;

    if (!isSkipped) {
      isCorrect = norm(userAnswer) === norm(t.a);
    }
    store.record(t.q, isCorrect); // №9

    results.push({
      sectionIdx: sectionIdx,
      taskIdx: taskIdx,
      q: t.q,
      userAnswer: userAnswer,
      correctAnswer: t.a,
      isCorrect: isCorrect,
      isSkipped: isSkipped
    });

    if (isSkipped) {
      $feedback.textContent = 'Пропущено';
      $feedback.className = 'skipped';
      $correct.textContent = 'Правильный ответ: ' + t.a;
      $correct.style.display = '';
    } else if (isCorrect) {
      $feedback.textContent = '✓';
      $feedback.className = 'correct';
      totalSolved++;
    } else {
      $feedback.textContent = '✗';
      $feedback.className = 'wrong';
      $correct.textContent = 'Правильный ответ: ' + t.a;
      $correct.style.display = '';
      // Короткая вибрация при ошибке (только телефоны)
      if (navigator.vibrate) { try { navigator.vibrate(80); } catch (err) {} }
    }

    $input.className = isCorrect ? 'correct' : (isSkipped ? 'skipped' : 'wrong');
    updateProgress();

    setTimeout(function() {
      advance();
    }, FEEDBACK_DELAY);
  }

  // --- Event handlers ---
  // Отправка ответа: Enter или кнопка «✓» (для телефона)
  function submitAnswer() {
    var val = $input.value;
    if (val.trim() === '') return;
    handleAnswer(val, false);
  }

  $input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      submitAnswer();
    }
  });

  var $submitBtn = document.getElementById('submit-btn');
  if ($submitBtn) {
    // mousedown гасим, чтобы кнопка не забирала фокус у поля (клавиатура бы закрылась)
    $submitBtn.addEventListener('mousedown', function(e) { e.preventDefault(); });
    $submitBtn.addEventListener('click', submitAnswer);
  }

  $dunnoBtn.addEventListener('mousedown', function(e) { e.preventDefault(); });
  $dunnoBtn.addEventListener('click', function() {
    handleAnswer('', true);
  });

  var $restartBtn = document.getElementById('restart-btn');
  $restartBtn.addEventListener('click', function() {
    sectionIdx = 0;
    taskIdx = 0;
    totalSolved = 0;
    results = [];
    $reportArea.style.display = 'none';
    $mainArea.style.display = '';
    document.getElementById('progress-row').style.display = '';
    showTask();
  });

  // --- Start ---
  showTask();
})();

    </script>
    <script>
// PWA: регистрация service worker (страница тренажёра входит в scope /trainers/)
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/trainers/sw.js');

// PWA: системная кнопка «назад» на телефоне не выходит из приложения,
// а ведёт на портал. Только в standalone-режиме — в обычном браузере
// «назад» и так возвращает на предыдущую страницу.
// ВАЖНО: Chrome пропускает записи истории, добавленные БЕЗ действия
// пользователя (защита от back-trapping), поэтому pushState — только
// после первого касания/клавиши, а не при загрузке.
(function() {
  var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
    || window.navigator.standalone === true;
  if (!standalone || !window.history || !history.pushState) return;
  var armed = false;
  function arm() {
    if (armed) return;
    armed = true;
    ['pointerdown', 'keydown', 'touchstart'].forEach(function(t) {
      window.removeEventListener(t, arm, true);
    });
    history.pushState({ backToPortal: 1 }, '');
  }
  ['pointerdown', 'keydown', 'touchstart'].forEach(function(t) {
    window.addEventListener(t, arm, true);
  });
  window.addEventListener('popstate', function() {
    location.replace('../index.html');
  });
})();

// №4: Escape — выход на портал из любого тренажёра (общее для всех движков;
// адрес берём из ссылки «← Все тренажёры» выше на странице).
// Прогресс нигде не сохраняется, поэтому от случайного Escape (привычка
// закрыть клавиатуру/автодополнение) защищаемся: при фокусе в поле ввода
// первый Escape только снимает фокус, выходит лишь второй.
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Escape' || e.isComposing) return;
  var ae = document.activeElement;
  if (ae && ae.tagName === 'INPUT') { ae.blur(); return; }
  var portalLink = document.querySelector('a.portal-link');
  if (portalLink) location.href = portalLink.getAttribute('href');
});
    </script>
