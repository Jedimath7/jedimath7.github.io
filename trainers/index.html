<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Системная отработка навыков — математические тренажёры</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'EB Garamond', serif;
            background: radial-gradient(circle at 50% 20%, #e8e0d0 0%, #d4c8b0 70%, #b8a890 100%);
            color: #1a0f09;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── Hero ── */
        .hero {
            text-align: center;
            margin-bottom: 60px;
        }
        .hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2em;
            color: #1a0f09;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.15);
            margin-bottom: 16px;
        }
        .hero h1::after {
            content: '';
            display: block;
            width: 40%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b7a60, transparent);
            margin: 20px auto 0;
        }
        .hero p {
            font-size: 1.15em;
            color: #4a3828;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ── Filter ── */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 50px;
        }
        .filter-btn {
            font-family: 'EB Garamond', serif;
            font-size: 1.05em;
            padding: 8px 22px;
            border: 2px solid rgba(74, 56, 40, 0.3);
            border-radius: 24px;
            background: transparent;
            color: #4a3828;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.02em;
        }
        .filter-btn:hover {
            border-color: #4a3828;
            background: rgba(74, 56, 40, 0.06);
        }
        .filter-btn.active {
            background: #4a3828;
            color: #e8e0d0;
            border-color: #4a3828;
            font-weight: 700;
        }

        /* ── Section heading ── */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            color: #1a0f09;
            margin-bottom: 24px;
            text-align: center;
        }

        /* ── Trainer grid ── */
        .trainer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 22px;
            margin-bottom: 70px;
        }

        .trainer-card {
            border-radius: 10px;
            padding: 28px 24px 70px;
            position: relative;
            text-decoration: none;
            color: #1a0f09;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
            display: block;
        }
        .trainer-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.35);
        }

        .trainer-card .class-badge {
            position: absolute;
            top: 14px;
            right: 16px;
            font-size: 0.82em;
            background: rgba(0,0,0,0.12);
            padding: 2px 10px;
            border-radius: 3px;
            color: inherit;
            opacity: 0.75;
        }

        .trainer-card .card-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            margin-bottom: 6px;
        }

        .trainer-card .card-sub {
            font-size: 1em;
            opacity: 0.7;
            margin-bottom: 12px;
        }

        .trainer-card .card-tasks {
            font-size: 0.9em;
            opacity: 0.55;
        }

        .trainer-card .card-btn {
            position: absolute;
            bottom: 18px;
            right: 20px;
            font-family: 'EB Garamond', serif;
            font-size: 0.95em;
            padding: 6px 20px;
            border-radius: 20px;
            border: 2px solid currentColor;
            background: transparent;
            color: inherit;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s, background 0.2s;
        }
        .trainer-card:hover .card-btn {
            opacity: 1;
            background: rgba(0,0,0,0.06);
        }

        .trainer-card.hidden {
            display: none;
        }

        /* ── Testing section ── */
        .testing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .testing-card {
            border: 2px dashed rgba(74, 56, 40, 0.2);
            border-radius: 8px;
            padding: 24px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.02);
            transition: border-color 0.2s, background 0.2s;
        }
        .testing-card:hover {
            border-color: rgba(74, 56, 40, 0.4);
            background: rgba(0, 0, 0, 0.04);
        }
        .testing-card .test-title {
            font-family: 'Cinzel', serif;
            font-size: 1.05em;
            color: #1a0f09;
            margin-bottom: 4px;
        }
        .testing-card .test-sub {
            font-size: 0.9em;
            color: #6b5848;
        }
        .testing-card .test-badge {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.78em;
            padding: 3px 12px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.06);
            color: #6b5848;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            margin-top: 70px;
            font-size: 0.85em;
            color: #8b7a60;
        }

        @media (max-width: 600px) {
            .container { padding: 24px 16px 60px; }
            .hero h1 { font-size: 1.6em; }
            .hero p { font-size: 1em; }
            .trainer-grid { grid-template-columns: 1fr; }
            .testing-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">

        <p>
            Тренажёры для нарешивания математики до автоматизма — короткими забегами,
            с мгновенной обратной связью и работой над ошибками. Каждый тренажёр изолирует
            ровно один микронавык.
        </p>
    </header>

</div>

                '<div class="test-title">' + t.grade + '</div>' +
                '<div class="test-sub">Сборное тестирование из разных тем</div>' +
                '<span class="test-badge" style="background:rgba(42,106,42,0.12);color:#2a6a2a;">Пройти</span>';
            testingGrid.appendChild(card);
        } else {
            const card = document.createElement('div');
            card.className = 'testing-card';
            card.innerHTML =
                '<div class="test-title">' + t.grade + '</div>' +
                '<div class="test-sub">Сборное тестирование из разных тем</div>' +
                '<span class="test-badge">Скоро</span>';
            testingGrid.appendChild(card);
        }
    });

    // ── Filter ──
    const filterBar = document.getElementById('filter-bar');
    let activeFilter = 'all';

    filterBar.addEventListener('click', function(e) {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;

        // Update active state
        filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        activeFilter = btn.dataset.filter;

        // Show/hide cards
        const cards = grid.querySelectorAll('.trainer-card');
        cards.forEach(card => {
            if (activeFilter === 'all') {
                card.classList.remove('hidden');
            } else {
                const cardClasses = card.dataset.classes.split(',');
                card.classList.toggle('hidden', !cardClasses.includes(activeFilter));
            }
        });
    });
</script>

</body>
</html>
